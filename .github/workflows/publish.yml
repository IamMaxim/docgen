name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - name: Parse version from tag
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          case "$TAG" in
            v*)
              VERSION="${TAG#v}"
              ;;
            *)
              echo "::error::Tag '$TAG' must be 'vX.Y.Z'."
              exit 1
              ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify both packages match the tag version
        run: |
          DOCGEN=$(node -p "require('./packages/docgen/package.json').version")
          CREATE=$(node -p "require('./packages/create-docgen/package.json').version")
          if [ "$DOCGEN" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::packages/docgen version ($DOCGEN) != tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi
          if [ "$CREATE" != "${{ steps.tag.outputs.version }}" ]; then
            echo "::error::packages/create-docgen version ($CREATE) != tag (${{ steps.tag.outputs.version }})"
            exit 1
          fi

      - name: Build @iammaxim/docgen
        run: npm run build -w @iammaxim/docgen

      - name: Publish @iammaxim/docgen
        working-directory: packages/docgen
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Publish @iammaxim/create-docgen
        working-directory: packages/create-docgen
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
